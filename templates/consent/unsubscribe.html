{% load i18n %}<!DOCTYPE html>
<html lang="{{ LANGUAGE_CODE }}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% trans "Unsubscribe" %}</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #fafafa;
      color: #111827;
      margin: 0;
      padding: 2rem 1rem;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      background: #ffffff;
      border: 1px solid #e5e7eb;
      border-radius: 0.5rem;
      padding: 2rem;
      max-width: 480px;
      width: 100%;
    }
    h1 { font-size: 1.25rem; font-weight: 600; margin: 0 0 0.5rem; }
    p.muted { color: #6b7280; font-size: 0.875rem; margin: 0 0 1.5rem; }
    .radio-group { margin-bottom: 1.5rem; }
    .radio-group label {
      display: block;
      padding: 0.75rem;
      margin-bottom: 0.5rem;
      border: 1px solid #e5e7eb;
      border-radius: 0.375rem;
      cursor: pointer;
      font-size: 0.9375rem;
    }
    .radio-group label:hover { border-color: #6366f1; }
    .radio-group input[type="radio"] { margin-right: 0.5rem; }
    .warning {
      color: #6b7280;
      font-size: 0.8125rem;
      margin: 0.25rem 0 0 1.25rem;
    }
    button[type="submit"] {
      background: #6366f1;
      color: #ffffff;
      border: none;
      border-radius: 0.375rem;
      padding: 0.625rem 1.5rem;
      font-size: 0.9375rem;
      cursor: pointer;
    }
    button[type="submit"]:hover { background: #4f46e5; }
  </style>
</head>
<body>
  <div class="card">
    <h1>{% trans "Email preferences" %}</h1>
    <p class="muted">{% trans "Choose how you would like to manage your email subscription." %}</p>

    <form method="post" action="{% url 'consent:unsubscribe' %}">
      {% csrf_token %}
      {{ form.token }}
      {{ form.email_type_slug }}

      <div class="radio-group">
        {% for choice in form.action %}
        <label>
          {{ choice.tag }}
          {{ choice.choice_label }}
          {% if choice.data.value == "deletion" %}
          <div class="warning">{% trans "This will permanently remove all data we hold about you." %}</div>
          {% endif %}
        </label>
        {% endfor %}
      </div>

      <button type="submit">{% trans "Confirm" %}</button>
    </form>
  </div>
</body>
</html>
