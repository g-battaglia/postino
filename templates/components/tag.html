{% spaceless %}

<span class="inline-flex items-center gap-1 px-[7px] py-[2px] text-[11.5px] rounded font-medium
             {% if color == "green" %}bg-emerald-100 text-emerald-700
             {% elif color == "blue" %}bg-blue-100 text-blue-700
             {% elif color == "amber" %}bg-amber-100 text-amber-700
             {% elif color == "purple" %}bg-purple-100 text-purple-700
             {% elif color == "pink" %}bg-pink-100 text-pink-700
             {% elif color == "indigo" %}bg-indigo-100 text-indigo-700
             {% else %}bg-gray-100 text-gray-700{% endif %}">
  {{ name }}
  {% if removable %}
  <button type="button" class="text-gray-400 hover:text-gray-700 ml-0.5 text-[12px] leading-none cursor-pointer"
          aria-label="Remove tag {{ name }}">&times;</button>
  {% endif %}
</span>
{% endspaceless %}
