{% spaceless %}
<svg width="{{ size|default:16 }}" height="{{ size|default:16 }}"
     viewBox="0 0 24 24" fill="none" stroke="currentColor"
     stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"
     class="{{ class_extra|default:'' }}"
     aria-hidden="true">
  {% if name == "home" %}
  <path d="M3 11.5 12 4l9 7.5V20a1 1 0 0 1-1 1h-5v-6h-6v6H4a1 1 0 0 1-1-1z"/>
  {% elif name == "users" %}
  <circle cx="9" cy="8" r="3.5"/><path d="M3 20c0-3 2.7-5 6-5s6 2 6 5"/><path d="M17 11a3 3 0 0 0 0-6"/><path d="M16 20c0-2.4 1.6-4 4-4"/>
  {% elif name == "send" %}
  <path d="M21 3 11 14"/><path d="M21 3 14.5 21l-3.5-7-7-3.5z"/>
  {% elif name == "workflow" %}
  <rect x="3" y="3" width="6" height="6" rx="1"/><rect x="15" y="15" width="6" height="6" rx="1"/><path d="M9 6h6a3 3 0 0 1 3 3v6"/>
  {% elif name == "mail" %}
  <rect x="3" y="5" width="18" height="14" rx="2"/><path d="m3 7 9 6 9-6"/>
  {% elif name == "chart" %}
  <path d="M4 20V8"/><path d="M10 20V4"/><path d="M16 20v-8"/><path d="M22 20H2"/>
  {% elif name == "pulse" %}
  <path d="M3 12h4l3-9 4 18 3-9h4"/>
  {% elif name == "cog" %}
  <circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.7 1.7 0 0 0 .3 1.8l.1.1a2 2 0 1 1-2.8 2.8l-.1-.1a1.7 1.7 0 0 0-1.8-.3 1.7 1.7 0 0 0-1 1.5V21a2 2 0 1 1-4 0v-.1a1.7 1.7 0 0 0-1-1.5 1.7 1.7 0 0 0-1.8.3l-.1.1A2 2 0 1 1 4.4 17l.1-.1a1.7 1.7 0 0 0 .3-1.8 1.7 1.7 0 0 0-1.5-1H3a2 2 0 1 1 0-4h.1a1.7 1.7 0 0 0 1.5-1 1.7 1.7 0 0 0-.3-1.8L4.2 7A2 2 0 1 1 7 4.2l.1.1a1.7 1.7 0 0 0 1.8.3H9a1.7 1.7 0 0 0 1-1.5V3a2 2 0 1 1 4 0v.1a1.7 1.7 0 0 0 1 1.5 1.7 1.7 0 0 0 1.8-.3l.1-.1A2 2 0 1 1 19.8 7l-.1.1a1.7 1.7 0 0 0-.3 1.8V9a1.7 1.7 0 0 0 1.5 1H21a2 2 0 1 1 0 4h-.1a1.7 1.7 0 0 0-1.5 1z"/>
  {% elif name == "search" %}
  <circle cx="11" cy="11" r="7"/><path d="m20 20-3.5-3.5"/>
  {% elif name == "plus" %}
  <path d="M12 5v14"/><path d="M5 12h14"/>
  {% elif name == "upload" %}
  <path d="M12 16V4"/><path d="m6 10 6-6 6 6"/><path d="M4 20h16"/>
  {% elif name == "download" %}
  <path d="M12 4v12"/><path d="m6 10 6 6 6-6"/><path d="M4 20h16"/>
  {% elif name == "filter" %}
  <path d="M4 5h16"/><path d="M7 12h10"/><path d="M10 19h4"/>
  {% elif name == "chevDown" %}
  <path d="m6 9 6 6 6-6"/>
  {% elif name == "chevRight" %}
  <path d="m9 6 6 6-6 6"/>
  {% elif name == "chevLeft" %}
  <path d="m15 6-6 6 6 6"/>
  {% elif name == "check" %}
  <path d="m5 12 5 5L20 7"/>
  {% elif name == "x" %}
  <path d="m6 6 12 12"/><path d="m18 6-12 12"/>
  {% elif name == "arrowUp" %}
  <path d="M12 19V5"/><path d="m5 12 7-7 7 7"/>
  {% elif name == "arrowDown" %}
  <path d="M12 5v14"/><path d="m5 12 7 7 7-7"/>
  {% elif name == "eye" %}
  <path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7S2 12 2 12z"/><circle cx="12" cy="12" r="3"/>
  {% elif name == "click" %}
  <path d="m9 9 12 5-5 2-2 5z"/><path d="M5 5v.01"/><path d="M3 12v.01"/><path d="M5 19v.01"/><path d="M12 3v.01"/>
  {% elif name == "bolt" %}
  <path d="M13 2 4 14h7l-1 8 9-12h-7z"/>
  {% elif name == "bounce" %}
  <path d="M3 12c0-5 4-9 9-9s9 4 9 9"/><path d="m17 9-2 3h4"/><path d="M21 12c0 5-4 9-9 9s-9-4-9-9"/>
  {% elif name == "trash" %}
  <path d="M3 6h18"/><path d="M8 6V4a1 1 0 0 1 1-1h6a1 1 0 0 1 1 1v2"/><path d="m5 6 1 14a2 2 0 0 0 2 2h8a2 2 0 0 0 2-2l1-14"/>
  {% elif name == "edit" %}
  <path d="M12 20h9"/><path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4z"/>
  {% elif name == "copy" %}
  <rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
  {% elif name == "bell" %}
  <path d="M6 8a6 6 0 0 1 12 0c0 7 3 9 3 9H3s3-2 3-9"/><path d="M10 21a2 2 0 0 0 4 0"/>
  {% elif name == "calendar" %}
  <rect x="3" y="5" width="18" height="16" rx="2"/><path d="M3 10h18"/><path d="M8 3v4"/><path d="M16 3v4"/>
  {% elif name == "clock" %}
  <circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/>
  {% elif name == "info" %}
  <circle cx="12" cy="12" r="9"/><path d="M12 8v.01"/><path d="M11 12h1v4h1"/>
  {% elif name == "warn" %}
  <path d="M12 3 2 21h20z"/><path d="M12 10v5"/><path d="M12 18v.01"/>
  {% elif name == "tag" %}
  <path d="M3 12V4a1 1 0 0 1 1-1h8l9 9-9 9-9-9z"/><circle cx="8" cy="8" r="1.5"/>
  {% elif name == "flow" %}
  <circle cx="6" cy="6" r="2"/><circle cx="18" cy="6" r="2"/><circle cx="6" cy="18" r="2"/><path d="M6 8v8"/><path d="M8 6h8"/>
  {% elif name == "leaf" %}
  <path d="M21 3c0 9-7 14-13 14-3 0-5-1-5-1S6 4 18 3z"/>
  {% elif name == "play" %}
  <path d="m8 5 12 7-12 7z"/>
  {% elif name == "pause" %}
  <rect x="6" y="5" width="4" height="14" rx="1"/><rect x="14" y="5" width="4" height="14" rx="1"/>
  {% elif name == "db" %}
  <ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M3 5v6c0 1.7 4 3 9 3s9-1.3 9-3V5"/><path d="M3 11v6c0 1.7 4 3 9 3s9-1.3 9-3v-6"/>
  {% elif name == "moreH" %}
  <circle cx="5" cy="12" r="1"/><circle cx="12" cy="12" r="1"/><circle cx="19" cy="12" r="1"/>
  {% elif name == "sparkle" %}
  <path d="M12 3v3"/><path d="M12 18v3"/><path d="M3 12h3"/><path d="M18 12h3"/><path d="m5.6 5.6 2.1 2.1"/><path d="m16.3 16.3 2.1 2.1"/><path d="m5.6 18.4 2.1-2.1"/><path d="m16.3 7.7 2.1-2.1"/>
  {% endif %}
</svg>
{% endspaceless %}
